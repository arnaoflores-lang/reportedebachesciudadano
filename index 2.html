<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Baches Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #ddd6fe;
            --primary-dark: #6d28d9;
            --bg-gradient: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
            --card-bg: #ffffff;
            --text-title: #0f172a;
            --text-body: #475569;
            --shadow: 0 20px 25px -5px rgba(124, 58, 237, 0.05), 0 8px 10px -6px rgba(124, 58, 237, 0.05);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-body);
            min-height: 100vh;
        }

        .hero-bg {
            background: linear-gradient(180deg, rgba(243,232,255,1) 0%, rgba(255,255,255,0) 100%);
            padding: 40px 20px 10px 20px;
            text-align: center;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .tag-secundario {
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 12px;
        }

        h1 {
            color: var(--text-title);
            font-size: 36px;
            font-weight: 800;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(124, 58, 237, 0.05);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-body);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid rgba(124, 58, 237, 0.08);
        }

        .section-panel {
            display: none;
        }

        .section-panel.active {
            display: block;
        }

        .upload-section {
            border: 2px dashed #e2e8f0;
            padding: 35px 20px;
            text-align: center;
            border-radius: 18px;
            background: #fdfbff;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.25s ease;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: #f5f3ff;
        }

        .upload-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: #f3e8ff;
            color: var(--primary);
            border-radius: 50%;
            font-size: 24px;
            margin-bottom: 12px;
        }

        input[type="file"] {
            display: none;
        }

        .img-preview {
            max-width: 100%;
            max-height: 220px;
            border-radius: 14px;
            margin-top: 15px;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-dark); }

        .btn-clear {
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            padding: 6px 12px;
            width: auto;
            box-shadow: none;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .btn-clear:hover { color: #ef4444; background: #fff5f5; }

        #map {
            height: 300px;
            width: 100%;
            border-radius: 16px;
            margin-top: 24px;
            display: none;
            border: 1px solid #f1f5f9;
        }

        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        .info-geo {
            margin-top: 14px;
            font-size: 14px;
            background: #fafafa;
            padding: 14px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            display: none;
            line-height: 1.6;
        }

        /* Historial */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-header h2 { margin: 0; font-size: 18px; color: var(--text-title); }
        .history-list { display: flex; flex-direction: column; gap: 14px; }
        .history-item { display: flex; align-items: center; background: #ffffff; padding: 14px; border-radius: 16px; border: 1px solid #f1f5f9; gap: 16px; }
        .history-img { width: 56px; height: 56px; object-fit: cover; border-radius: 10px; }
        .history-details { flex-grow: 1; font-size: 13px; }
        .history-date { font-weight: 700; color: var(--text-title); margin-bottom: 4px; }
        .btn-delete-item { background: transparent; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 8px; border-radius: 8px; }
        .btn-delete-item:hover { color: #ef4444; background: #fee2e2; }
        .no-history { text-align: center; color: #94a3b8; font-style: italic; padding: 20px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="hero-bg">
    <span class="tag-secundario">Módulo de Geolocalización</span>
    <h1>Reporte de Baches</h1>
</div>

<div class="container">
    <div class="tabs">
        <button id="tab-realtime" class="tab-btn active" onclick="switchTab('realtime')">📸 Tiempo Real (GPS)</button>
        <button id="tab-saved" class="tab-btn" onclick="switchTab('saved')">📁 Foto Guardada (Metadatos EXIF)</button>
    </div>

    <div id="panel-realtime" class="section-panel active card">
        <div class="upload-section" onclick="document.getElementById('fileRealTime').click()">
            <div class="upload-icon">📸</div>
            <p style="margin: 0; font-weight: 700; color: var(--primary);">Tomar foto en este instante</p>
            <p style="margin: 4px 0 0 0; color: #94a3b8; font-size: 13px;">Usa la cámara de tu dispositivo móvil</p>
            <input type="file" id="fileRealTime" accept="image/*" capture="environment">
            <img id="previewRealTime" class="img-preview" alt="Vista previa">
        </div>
        <button class="btn btn-primary" id="btnReportarRealTime">📍 Capturar Ubicación Exacta y Hora</button>
    </div>

    <div id="panel-saved" class="section-panel card">
        <div class="upload-section" onclick="document.getElementById('fileSaved').click()">
            <div class="upload-icon">📁</div>
            <p style="margin: 0; font-weight: 700; color: var(--primary);">Subir archivo de la galería</p>
            <p style="margin: 4px 0 0 0; color: #94a3b8; font-size: 13px;">Se analizará el mapa interno de la imagen</p>
            <input type="file" id="fileSaved" accept="image/*">
            <img id="previewSaved" class="img-preview" alt="Vista previa">
        </div>
        <button class="btn btn-primary" id="btnAnalizarFoto">🔍 Extraer Referencias de Ubicación</button>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <div id="statusMessage" class="status"></div>
        <div id="geoInfo" class="info-geo"></div>
        <div id="map"></div>
    </div>

    <div class="card">
        <div class="history-header">
            <h2>📋 Reportes archivados</h2>
            <button class="btn-clear" id="btnClearHistory" style="display: none;">Limpiar todo</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>
</div>

<script>
    let map = null;
    let marker = null;
    let fotoBase64_RT = "";
    let fotoBase64_Saved = "";
    let archivoSavedRaw = null;

    // Ejecución segura inmediata del diseño base
    initBaseUI();

        // Forzar a que cargue el historial local de inmediato sin esperar a los mapas
        setTimeout(() => {
            try { cargarHistorial(); } catch(e){}
        }, 50);

        let leafletScript = document.createElement('script');
